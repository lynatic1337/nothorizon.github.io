<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Horizon</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100vh;
            margin: 0;
            box-sizing: border-box;
            text-align: center;
            overflow-x: hidden;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        p {
            line-height: 1.8;
            max-width: 600px;
            font-size: 16px;
            margin-bottom: 24px;
        }

        .cookie-container {
            margin-top: 20px;
        }

        .cookie-img {
            image-rendering: pixelated; 
            width: 64px;
            height: 64px;
        }

        .footer {
           width: 100%;
           text-align: center;
        }

        /* Full-width CSS Enby Flag */
        .enby-flag {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 48px;
        }

        .stripe {
            flex: 1;
            width: 100%;
        }

        .yellow { background-color: #FCF434; }
        .white  { background-color: #FFFFFF; }
        .purple { background-color: #9C59D1; }
        .black  { background-color: #2C2C2C; }
        
    </style>
</head>
<body>

    <div class="main-content">
        <p>Sorry for misdirecting you,<br><br>this is not Horizon at all.</p>
        <p>Take a cookie if you want.</p>
        
       <img class="cookie-img" src="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f36a.png" alt="A cookie">
    </div>

    <div class="footer">
        <div class="main-content">
            <p>Greetings from Berlin :3</p>
        </div>
        <div class="enby-flag" title="Non-binary Pride Flag">
            <div class="stripe yellow"></div>
            <div class="stripe white"></div>
            <div class="stripe purple"></div>
            <div class="stripe black"></div>
        </div>
    </div>

</body>
</html>
